# docker-compose.web-test.yml
# Test overlay: adds mock Brave Search server for pinchy-web E2E tests.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.web-test.yml up --build -d

services:
  brave-mock:
    build:
      context: config/brave-mock
    ports:
      - "9003:9003"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9003/control/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  pinchy:
    environment:
      # Emit a dummy API-key SecretRef for the local Ollama provider so OpenClaw
      # authenticates when routing to host.docker.internal (not treated as local).
      - PINCHY_E2E_OLLAMA_LOCAL_API_KEY=1
    extra_hosts:
      # Allows Pinchy (Docker) to fetch the Ollama model list from fake-Ollama on
      # the host during regenerateOpenClawConfig(). OpenClaw already has this
      # mapping via the base docker-compose.yml extra_hosts block.
      - "ollama.local:host-gateway"

  openclaw:
    environment:
      - BRAVE_API_BASE_URL=http://brave-mock:9003
