name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta-pinchy
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/heypinchy/pinchy
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Build and push Pinchy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.pinchy
          push: true
          tags: ${{ steps.meta-pinchy.outputs.tags }}
          labels: ${{ steps.meta-pinchy.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for OpenClaw image
        id: meta-openclaw
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/heypinchy/pinchy-openclaw
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Build and push OpenClaw image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.openclaw
          push: true
          tags: ${{ steps.meta-openclaw.outputs.tags }}
          labels: ${{ steps.meta-openclaw.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docs/public/installing.html
            docs/public/cloud-init.yml
