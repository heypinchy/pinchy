name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Point buildkit at mirror.gcr.io as a pull-through cache for Docker
      # Hub (same reason as .github/actions/docker-mirror in CI — avoids the
      # 200 pulls/6h rate limit). buildx runs in its own buildkit container,
      # so /etc/docker/daemon.json doesn't apply; we configure it here.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta-pinchy
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/heypinchy/pinchy
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Build and push Pinchy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.pinchy
          push: true
          tags: ${{ steps.meta-pinchy.outputs.tags }}
          labels: ${{ steps.meta-pinchy.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for OpenClaw image
        id: meta-openclaw
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/heypinchy/pinchy-openclaw
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Build and push OpenClaw image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.openclaw
          push: true
          tags: ${{ steps.meta-openclaw.outputs.tags }}
          labels: ${{ steps.meta-openclaw.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  end-user-install-published:
    name: End-user install (published images)
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4

      - name: Ensure no GHCR credentials
        run: docker logout ghcr.io || true

      - name: Prepare clean install directory
        id: install-dir
        run: |
          INSTALL_DIR=$(mktemp -d)
          cp docker-compose.yml "$INSTALL_DIR/"
          echo "path=$INSTALL_DIR" >> "$GITHUB_OUTPUT"
          echo "Clean install dir: $INSTALL_DIR"
          ls -la "$INSTALL_DIR"

      - name: Pin image tags to this release
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          # Scope 2 will migrate this to .env-based versioning.
          # For now: sed :latest → :<tag> in docker-compose.yml.
          sed -i "s|:latest|:${GITHUB_REF_NAME}|g" docker-compose.yml
          cat docker-compose.yml

      - name: Pull images anonymously (fails loudly if GHCR is private)
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: docker compose pull

      - name: Start stack from clean install dir
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: docker compose up -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for health
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7777/api/health; then
              echo "Stack healthy"
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              docker compose ps
              docker compose logs --tail=20 pinchy
            fi
            sleep 2
          done
          echo "::error::Published-image install health check failed"
          docker compose ps
          docker compose logs
          exit 1

      - name: Assert all services running
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          RUNNING=$(docker compose ps --format json | jq -rs '[.[] | select(.State == "running")] | length')
          echo "Running services: $RUNNING"
          if [ "$RUNNING" -ne 3 ]; then
            echo "::error::Expected 3 running services, got $RUNNING"
            docker compose ps
            exit 1
          fi

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, end-user-install-published]

    steps:
      - uses: actions/checkout@v4

      - name: Generate versioned cloud-init.yml
        run: sed "s/%%PINCHY_VERSION%%/${GITHUB_REF_NAME}/g" docs/src/snippets/cloud-init.yml > /tmp/cloud-init.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docs/public/installing.html
            /tmp/cloud-init.yml

  docs:
    name: Deploy Docs
    needs: release
    # Releases created by GITHUB_TOKEN don't fire `release: published`
    # events, so we call the docs workflow directly from here instead
    # of relying on a trigger in docs.yml.
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write
