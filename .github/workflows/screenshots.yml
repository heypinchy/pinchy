name: Screenshots

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  capture:
    name: Capture screenshots
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm -C packages/web exec playwright install chromium

      - name: Start PostgreSQL
        run: |
          brew install postgresql@17
          brew services start postgresql@17
          sleep 3
          /opt/homebrew/opt/postgresql@17/bin/createuser -s pinchy 2>/dev/null || true
          /opt/homebrew/opt/postgresql@17/bin/createdb -O pinchy pinchy 2>/dev/null || true
          /opt/homebrew/opt/postgresql@17/bin/psql -c "ALTER USER pinchy PASSWORD 'pinchy_dev';" pinchy

      - name: Generate enterprise key for screenshots
        id: license
        run: |
          TOKEN=$(PINCHY_LICENSE_PRIVATE_KEY="${{ secrets.PINCHY_LICENSE_PRIVATE_KEY }}" \
            pnpm -C packages/web exec tsx ../../scripts/generate-license.ts \
            --org "Acme Corp (Screenshots)" --type trial --days 14)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Build and start Pinchy
        run: |
          cd packages/web
          pnpm build
          pnpm start &
          # Wait for Pinchy to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7777/api/health > /dev/null 2>&1; then
              echo "Pinchy is ready"
              break
            fi
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://pinchy:pinchy_dev@localhost:5432/pinchy
          BETTER_AUTH_SECRET: screenshot-session-secret
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          PINCHY_ENTERPRISE_KEY: ${{ steps.license.outputs.token }}
          OPENCLAW_GATEWAY_URL: ws://localhost:18789
          PORT: 7777

      - name: Seed demo data
        run: ./screenshots/seed.sh
        env:
          PINCHY_ENTERPRISE_KEY: ${{ steps.license.outputs.token }}

      - name: Prepare output directory
        run: mkdir -p ${{ github.workspace }}/screenshots/output

      - name: Capture screenshots
        run: pnpm -C packages/web exec playwright test --config=../../screenshots/playwright.config.ts
        env:
          BASE_URL: http://localhost:7777
          SCREENSHOT_DIR: ${{ github.workspace }}/screenshots/output

      - name: Copy screenshots to docs
        run: |
          mkdir -p docs/public/screenshots
          cp screenshots/output/*.png docs/public/screenshots/

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pinchy-screenshots
          path: screenshots/output/
          retention-days: 90

      - name: Upload to release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd screenshots/output
          tar czf /tmp/pinchy-screenshots.tar.gz *.png
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/pinchy-screenshots.tar.gz \
            --clobber

      - name: Notify website repo
        if: success()
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          gh api repos/heypinchy/website/dispatches \
            -f event_type=screenshots-updated \
            -f "client_payload[run_id]=${{ github.run_id }}" \
            || echo "⚠️ Website dispatch failed (token may not be configured)"
