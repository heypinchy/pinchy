name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @pinchy/web lint

      - name: Format check (web)
        run: pnpm --filter @pinchy/web format:check

      - name: Format check (docs & workflows)
        run: pnpm -C packages/web exec prettier --check "../../docs/src/**/*.{mdx,md}" "../../.github/**/*.yml"

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  license-keypair:
    name: Verify License Keypair
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify private key matches public key
        env:
          PINCHY_LICENSE_PRIVATE_KEY: ${{ secrets.PINCHY_LICENSE_PRIVATE_KEY }}
        run: |
          npm install jose
          node -e "
            const jose = require('jose');
            const fs = require('fs');
            const src = fs.readFileSync('packages/web/src/lib/enterprise.ts', 'utf8');
            const pubMatch = src.match(/-----BEGIN PUBLIC KEY-----[\s\S]+?-----END PUBLIC KEY-----/);
            if (!pubMatch) { console.error('❌ Public key not found in enterprise.ts'); process.exit(1); }
            (async () => {
              const priv = await jose.importPKCS8(process.env.PINCHY_LICENSE_PRIVATE_KEY, 'ES256');
              const pub = await jose.importSPKI(pubMatch[0], 'ES256');
              const jwt = await new jose.SignJWT({test: true}).setProtectedHeader({alg: 'ES256'}).sign(priv);
              await jose.jwtVerify(jwt, pub);
              console.log('✅ Keypair verified: private key matches public key in enterprise.ts');
            })();
          "

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          POSTGRES_DB: pinchy
          POSTGRES_USER: pinchy
          POSTGRES_PASSWORD: pinchy_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm -C packages/web exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm -C packages/web test:e2e
        env:
          CI: true

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build production images locally
        run: |
          docker build -t ghcr.io/heypinchy/pinchy:latest -f Dockerfile.pinchy .
          docker build -t ghcr.io/heypinchy/pinchy-openclaw:latest -f Dockerfile.openclaw .

      - name: Start production stack
        run: docker compose up -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for health (production)
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7777/api/health; then
              echo "Production stack healthy"
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            # Show container status on first and every 5th attempt
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              docker compose ps
              docker compose logs --tail=20 pinchy
            fi
            sleep 2
          done
          echo "Production health check failed"
          docker compose ps
          docker compose logs pinchy
          exit 1

      - name: Verify infrastructure ready (production)
        run: |
          for i in $(seq 1 15); do
            BODY=$(curl -sf http://localhost:7777/api/setup/status 2>/dev/null || echo '{}')
            DB=$(echo "$BODY" | jq -r '.infrastructure.database // "unknown"')
            OC=$(echo "$BODY" | jq -r '.infrastructure.openclaw // "unknown"')
            if [ "$DB" = "connected" ] && [ "$OC" = "connected" ]; then
              echo "Infrastructure ready (database=$DB, openclaw=$OC)"
              exit 0
            fi
            echo "Attempt $i: database=$DB, openclaw=$OC"
            sleep 2
          done
          echo "::error::Infrastructure not ready: database=$DB, openclaw=$OC"
          docker compose logs pinchy openclaw
          exit 1

      - name: Run setup wizard (production)
        run: |
          STATUS=$(curl -s -o /tmp/setup-response.json -w "%{http_code}" \
            -X POST http://localhost:7777/api/setup \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Admin","email":"ci@test.local","password":"CiTestPass123!"}')
          echo "Setup response (HTTP $STATUS):"
          cat /tmp/setup-response.json
          if [ "$STATUS" -ne 201 ]; then
            echo "Setup failed with status $STATUS"
            docker compose logs pinchy
            exit 1
          fi
          echo "Setup completed successfully"

      - name: Verify OpenClaw connection (production)
        run: |
          echo "Waiting for OpenClaw connection after setup..."
          for i in $(seq 1 30); do
            if docker compose logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connection verified (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Pinchy never connected to OpenClaw Gateway"
              docker compose logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done
          LOGS=$(docker compose logs pinchy openclaw 2>&1)
          if echo "$LOGS" | grep -q "blocked plugin candidate"; then
            echo "::error::OpenClaw blocked one or more plugins (ownership issue)"
            echo "$LOGS" | grep "blocked plugin candidate"
            docker compose logs pinchy openclaw
            exit 1
          fi

      - name: Verify OpenClaw config writable by Pinchy
        run: |
          # OpenClaw creates openclaw.json with root-only permissions (600).
          # Pinchy runs as non-root and needs write access for provider/agent config.
          # start-openclaw.sh must chmod the file after each OpenClaw startup.
          PERMS=$(docker compose exec -T pinchy stat -c '%a' /openclaw-config/openclaw.json 2>/dev/null || echo "000")
          echo "openclaw.json permissions: $PERMS"
          if [ "$PERMS" != "666" ]; then
            echo "::error::openclaw.json has permissions $PERMS (expected 666). Pinchy cannot write config."
            docker compose exec -T openclaw ls -la /root/.openclaw/openclaw.json
            exit 1
          fi
          echo "Config file permissions verified"

      - name: Verify clean startup (production)
        run: |
          LOGS=$(docker compose logs 2>&1)
          # OpenClaw may restart once after setup (config regeneration), but not more
          RESTART_COUNT=$(echo "$LOGS" | grep -c "Restarting OpenClaw Gateway" || true)
          if [ "$RESTART_COUNT" -gt 1 ]; then
            echo "::error::OpenClaw restarted $RESTART_COUNT time(s) during startup (expected at most 1)"
            docker compose logs openclaw
            exit 1
          fi
          # Pinchy should not spam connection errors
          ERROR_COUNT=$(echo "$LOGS" | grep -c "OpenClaw client error" || true)
          if [ "$ERROR_COUNT" -gt 1 ]; then
            echo "::warning::Pinchy logged $ERROR_COUNT OpenClaw connection errors (expected at most 1)"
          fi
          echo "Clean startup verified (restarts=$RESTART_COUNT, connection_errors=$ERROR_COUNT)"

      - name: Tear down production
        if: always()
        run: docker compose down -v

      - name: Start dev stack
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for health (dev)
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7777/api/health; then
              echo "Dev stack healthy"
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              docker compose -f docker-compose.yml -f docker-compose.dev.yml ps
              docker compose -f docker-compose.yml -f docker-compose.dev.yml logs --tail=20 pinchy
            fi
            sleep 2
          done
          echo "Dev health check failed"
          docker compose -f docker-compose.yml -f docker-compose.dev.yml ps
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy
          exit 1

      - name: Verify infrastructure ready (dev)
        run: |
          for i in $(seq 1 15); do
            BODY=$(curl -sf http://localhost:7777/api/setup/status 2>/dev/null || echo '{}')
            DB=$(echo "$BODY" | jq -r '.infrastructure.database // "unknown"')
            OC=$(echo "$BODY" | jq -r '.infrastructure.openclaw // "unknown"')
            if [ "$DB" = "connected" ] && [ "$OC" = "connected" ]; then
              echo "Infrastructure ready (database=$DB, openclaw=$OC)"
              exit 0
            fi
            echo "Attempt $i: database=$DB, openclaw=$OC"
            sleep 2
          done
          echo "::error::Infrastructure not ready: database=$DB, openclaw=$OC"
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy openclaw
          exit 1

      - name: Run setup wizard (dev)
        run: |
          STATUS=$(curl -s -o /tmp/setup-response.json -w "%{http_code}" \
            -X POST http://localhost:7777/api/setup \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Admin","email":"ci@test.local","password":"CiTestPass123!"}')
          echo "Setup response (HTTP $STATUS):"
          cat /tmp/setup-response.json
          if [ "$STATUS" -ne 201 ]; then
            echo "Setup failed with status $STATUS"
            docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy
            exit 1
          fi
          echo "Setup completed successfully"

      - name: Verify OpenClaw connection (dev)
        run: |
          echo "Waiting for OpenClaw connection after setup..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connection verified (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Pinchy never connected to OpenClaw Gateway"
              docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done
          # Note: plugin ownership check skipped for dev — bind-mounted plugins
          # inherit CI runner uid (not root), which OpenClaw blocks. The production
          # stack test already covers plugin ownership verification.

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml down -v

  telegram-e2e:
    name: Telegram E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start test stack with mock Telegram
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml up --build -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for services
        run: |
          echo "Waiting for Pinchy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/api/health >/dev/null 2>&1; then
              echo "Pinchy healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy not healthy after 120s"
              docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml logs pinchy
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for mock Telegram..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9001/control/health >/dev/null 2>&1; then
              echo "Mock Telegram healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::Mock Telegram not healthy after 30s"
              docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml logs telegram-mock
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for OpenClaw connection..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connected (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw"
              docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done

      - name: Run Telegram E2E tests
        run: pnpm -C packages/web test:e2e:telegram
        env:
          CI: true

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Pinchy logs ==="
          docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml logs pinchy 2>&1 | tail -50
          echo "=== OpenClaw logs ==="
          docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml logs openclaw 2>&1 | tail -50
          echo "=== Mock Telegram logs ==="
          docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml logs telegram-mock 2>&1 | tail -30

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml down -v

  links:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress '**/*.md' '**/*.mdx' --exclude-path node_modules --exclude-path .git --exclude-path docs --exclude 'localhost' --exclude 'linkedin\\.com' --exclude 'sonner\\.emilkowal\\.dev'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Check for local paths in codebase
        run: |
          # Block local absolute paths that should never be committed
          PATTERNS='/Users/|C:\\Users\\|C:/Users/'
          if git grep -lEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!.husky/' ':!*.md' 2>/dev/null; then
            echo "::error::Local absolute paths found in codebase:"
            git grep -nEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!.husky/' ':!*.md'
            exit 1
          fi
          echo "No local paths detected"

      - name: Check for secrets in codebase
        run: |
          # Check for common secret patterns in tracked files
          PATTERNS='(AKIA[A-Z0-9]{16}|sk-[a-zA-Z0-9]{20,}|-----BEGIN (RSA |EC )?PRIVATE KEY-----|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36})'
          if git grep -lEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!*.test.*' ':!*.md' 2>/dev/null; then
            echo "::error::Potential secrets found in codebase"
            exit 1
          fi
          echo "No secrets detected"
