# docker-compose.email-test.yml
# Test overlay: adds mock Gmail server, mock Graph server, and fake Ollama
# for pinchy-email E2E tests.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.email-test.yml up --build -d

services:
  fake-ollama:
    build:
      context: config/fake-ollama
    ports:
      - "11435:11435"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:11435/api/tags').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  gmail-mock:
    build:
      context: config/gmail-mock
    ports:
      - "9004:9004"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9004/control/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  graph-mock:
    build:
      context: config/graph-mock
    ports:
      - "9005:9005"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9005/control/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  openclaw:
    environment:
      - GMAIL_API_BASE_URL=http://gmail-mock:9004
      - GMAIL_OAUTH_BASE_URL=http://gmail-mock:9004
      - GRAPH_API_BASE_URL=http://graph-mock:9005
      - MICROSOFT_OAUTH_BASE_URL=http://graph-mock:9005
    depends_on:
      fake-ollama:
        condition: service_healthy

  pinchy:
    environment:
      # Emit a dummy API-key SecretRef for the local Ollama provider so OpenClaw
      # authenticates when routing to host.docker.internal (not treated as local).
      - PINCHY_E2E_OLLAMA_LOCAL_API_KEY=1
      - GRAPH_API_BASE_URL=http://graph-mock:9005
      - MICROSOFT_OAUTH_BASE_URL=http://graph-mock:9005
    extra_hosts:
      # Allows Pinchy (Docker) to fetch the Ollama model list from fake-Ollama on
      # the host during regenerateOpenClawConfig(). OpenClaw already has this
      # mapping via the base docker-compose.yml extra_hosts block.
      - "ollama.local:host-gateway"
    depends_on:
      fake-ollama:
        condition: service_healthy
