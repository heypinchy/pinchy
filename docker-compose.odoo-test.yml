# Test overlay: adds mock Odoo server for E2E testing.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.odoo-test.yml up --build -d

services:
  odoo-mock:
    build:
      context: config/odoo-mock
    ports:
      - "9002:9002"
      - "8069:8069"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9002/control/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  pinchy:
    environment:
      # Allow private URLs so the integration wizard can reach the mock Odoo server
      - ALLOW_PRIVATE_URLS=1
      # Emit a dummy API-key SecretRef for the local Ollama provider so OpenClaw
      # authenticates when routing to host.docker.internal (not treated as local).
      - PINCHY_E2E_OLLAMA_LOCAL_API_KEY=1
    extra_hosts:
      # Allows Pinchy (Docker) to fetch the Ollama model list from fake-Ollama on
      # the host during regenerateOpenClawConfig(). OpenClaw already has this mapping
      # via the base docker-compose.yml extra_hosts block.
      - "ollama.local:host-gateway"
