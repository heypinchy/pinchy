# Test overlay: adds a mock MCP server for the native-MCP E2E tests.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.mcp-test.yml up --build -d

services:
  mcp-mock:
    build:
      context: config/mcp-mock
    ports:
      - "9005:9005"
    environment:
      PORT: "9005"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:9005/control/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  pinchy:
    environment:
      # Enable the MCP integration feature for E2E tests
      - PINCHY_MCP_ENABLED=1
      - NEXT_PUBLIC_PINCHY_MCP_ENABLED=1
      # Allow private URLs so the MCP credential proxy (and tool sync) can reach
      # the internal mcp-mock container — mirrors the self-hosted "internal MCP
      # server" allowance.
      - ALLOW_PRIVATE_URLS=1
      # Emit a dummy ollama-local API key so the fake-LLM provider gets a
      # portable static auth profile — new dispatch agents inherit it, otherwise
      # the round-trip agent fails with "No API key found for provider ollama".
      # Same flag the web/odoo/email/integration dispatch stacks set.
      - PINCHY_E2E_OLLAMA_LOCAL_API_KEY=1
