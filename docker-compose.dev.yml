services:
  pinchy:
    build:
      context: .
      dockerfile: Dockerfile.pinchy.dev
    environment:
      - DATABASE_URL=postgresql://pinchy:pinchy_dev@db:5432/pinchy
      - BETTER_AUTH_SECRET=dev-secret-do-not-use-in-production
      - PINCHY_ENTERPRISE_KEY=${PINCHY_ENTERPRISE_KEY-eyJhbGciOiJFUzI1NiJ9.eyJ0eXBlIjoicGFpZCIsImZlYXR1cmVzIjpbImVudGVycHJpc2UiXSwiaXNzIjoiaGV5cGluY2h5LmNvbSIsInN1YiI6InBpbmNoeS1kZXYiLCJpYXQiOjE3NzM0ODUyMzQsImV4cCI6MjA4ODg0NTIzNH0.h6stBWDrHP2LnXBv18RDk9_y71_b8FvFU6IodCBJkldlLoW6uxX6P7Hr_SL8OM-jhaNqUu7BIMaTYvbqW28buA}
    volumes:
      - ./packages/web:/app/packages/web
      - /app/packages/web/node_modules
      - /app/packages/web/.next
      # plugin-manifest-loader.ts resolves openclaw.plugin.json files at
      # ../../../../plugins/<name>/ relative to web/src/lib/openclaw-config/.
      # Mount read-only so the dev server can import them without a rebuild.
      - ./packages/plugins:/app/packages/plugins:ro
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    extra_hosts:
      # ollama.local is mapped to the Docker host gateway so the OpenClaw
      # container can reach Ollama on the host. Pinchy's build.ts rewrites
      # host.docker.internal -> ollama.local in the emitted config because
      # host.docker.internal is not in OpenClaw 2026.4.27's isLocalBaseUrl
      # allowlist (*.local is).
      - "ollama.local:host-gateway"
    volumes:
      - ./packages/plugins/pinchy-files:/root/.openclaw/extensions/pinchy-files
      - ./packages/plugins/pinchy-context:/root/.openclaw/extensions/pinchy-context
      - ./packages/plugins/pinchy-audit:/root/.openclaw/extensions/pinchy-audit
      - ./packages/plugins/pinchy-odoo:/root/.openclaw/extensions/pinchy-odoo
      - ./packages/plugins/pinchy-web:/root/.openclaw/extensions/pinchy-web
      - ./packages/plugins/pinchy-email:/root/.openclaw/extensions/pinchy-email
      - ./packages/plugins/pinchy-docs:/root/.openclaw/extensions/pinchy-docs
      - ./sample-data:/data/sample-docs
  db:
    environment:
      - POSTGRES_PASSWORD=pinchy_dev
    ports:
      - "5434:5432"
  caddy:
    image: caddy:2
    ports:
      - "8443:443"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data_dev:/data
    depends_on:
      - pinchy

volumes:
  caddy_data_dev:
