services:
  pinchy:
    build:
      context: .
      dockerfile: Dockerfile.pinchy.dev
    environment:
      - DATABASE_URL=postgresql://pinchy:pinchy_dev@db:5432/pinchy
      - BETTER_AUTH_SECRET=dev-secret-do-not-use-in-production
      - PINCHY_ENTERPRISE_KEY=${PINCHY_ENTERPRISE_KEY-eyJhbGciOiJFUzI1NiJ9.eyJ0eXBlIjoicGFpZCIsImZlYXR1cmVzIjpbImVudGVycHJpc2UiXSwiaXNzIjoiaGV5cGluY2h5LmNvbSIsInN1YiI6InBpbmNoeS1kZXYiLCJpYXQiOjE3NzM0ODUyMzQsImV4cCI6MjA4ODg0NTIzNH0.h6stBWDrHP2LnXBv18RDk9_y71_b8FvFU6IodCBJkldlLoW6uxX6P7Hr_SL8OM-jhaNqUu7BIMaTYvbqW28buA}
    volumes:
      - ./packages/web:/app/packages/web
      - /app/packages/web/node_modules
      - /app/packages/web/.next
      # plugin-manifest-loader.ts resolves openclaw.plugin.json files at
      # ../../../../plugins/<name>/ relative to web/src/lib/openclaw-config/.
      # Mount read-only so the dev server can import them without a rebuild.
      - ./packages/plugins:/app/packages/plugins:ro
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    extra_hosts:
      # ollama.local is mapped to the host gateway so the OpenClaw container can
      # reach Ollama on the host. Pinchy normalizes every container-host alias
      # (host.docker.internal, *.orb.internal, ...) -> ollama.local in the
      # emitted config, which clears OpenClaw's isLocalBaseUrl via the stable
      # `.local` rule -- a deliberate decoupling from its host-alias allowlist
      # (which has changed across versions). See
      # packages/web/src/lib/openclaw-local-url.ts.
      - "ollama.local:host-gateway"
    volumes:
      # Plugin SOURCE is bind-mounted for live editing, but each node_modules is
      # masked by an anonymous volume — the SAME pattern the pinchy service uses
      # for /app/packages/web/node_modules above. This is load-bearing: the
      # OpenClaw container's start-openclaw.sh runs `rm -rf <ext>/node_modules &&
      # cp -r /opt/<plugin>-deps/node_modules` to swap in Linux-native deps. With
      # a bare bind-mount that rm+cp writes THROUGH to the host repo, deleting the
      # developer's pnpm-symlinked node_modules and leaving broken symlinks
      # (mammoth/@mozilla/readability/odoo-node fail to load). Masking node_modules
      # keeps the container's deps in the anonymous volume and the host untouched.
      - ./packages/plugins/pinchy-files:/root/.openclaw/extensions/pinchy-files
      - /root/.openclaw/extensions/pinchy-files/node_modules
      - ./packages/plugins/pinchy-context:/root/.openclaw/extensions/pinchy-context
      - /root/.openclaw/extensions/pinchy-context/node_modules
      - ./packages/plugins/pinchy-audit:/root/.openclaw/extensions/pinchy-audit
      - /root/.openclaw/extensions/pinchy-audit/node_modules
      - ./packages/plugins/pinchy-transcript:/root/.openclaw/extensions/pinchy-transcript
      - /root/.openclaw/extensions/pinchy-transcript/node_modules
      - ./packages/plugins/pinchy-odoo:/root/.openclaw/extensions/pinchy-odoo
      - /root/.openclaw/extensions/pinchy-odoo/node_modules
      - ./packages/plugins/pinchy-web:/root/.openclaw/extensions/pinchy-web
      - /root/.openclaw/extensions/pinchy-web/node_modules
      - ./packages/plugins/pinchy-email:/root/.openclaw/extensions/pinchy-email
      - /root/.openclaw/extensions/pinchy-email/node_modules
      - ./packages/plugins/pinchy-docs:/root/.openclaw/extensions/pinchy-docs
      - /root/.openclaw/extensions/pinchy-docs/node_modules
      - ./sample-data:/data/sample-docs
  db:
    environment:
      - POSTGRES_PASSWORD=pinchy_dev
    ports:
      - "5434:5432"
  caddy:
    image: caddy:2
    ports:
      - "8443:443"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data_dev:/data
    depends_on:
      - pinchy

volumes:
  caddy_data_dev:
