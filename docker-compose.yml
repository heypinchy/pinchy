services:
  pinchy:
    build:
      context: .
      dockerfile: Dockerfile.pinchy
    ports:
      - "${PINCHY_PORT:-7777}:7777"
    environment:
      - DATABASE_URL=postgresql://pinchy:${DB_PASSWORD:-pinchy_dev}@db:5432/pinchy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - OPENCLAW_WS_URL=ws://openclaw:18789
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PINCHY_ENTERPRISE_KEY=${PINCHY_ENTERPRISE_KEY:-}
    volumes:
      - openclaw-config:/openclaw-config
      - pinchy-workspaces:/openclaw-config/workspaces
      - openclaw-extensions:/openclaw-extensions
      - pinchy-secrets:/app/secrets
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      openclaw:
        condition: service_started

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    expose:
      - "18789"
    volumes:
      - openclaw-config:/root/.openclaw
      - pinchy-workspaces:/root/.openclaw/workspaces
      - openclaw-extensions:/root/.openclaw/extensions
      - pinchy-data:/data
      - pinchy-pdf-cache:/var/cache/pinchy-files
    restart: unless-stopped

  db:
    image: postgres:17
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=pinchy
      - POSTGRES_USER=pinchy
      - POSTGRES_PASSWORD=${DB_PASSWORD:-pinchy_dev}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinchy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  openclaw-config:
  pinchy-workspaces:
  pinchy-data:
  pinchy-secrets:
  openclaw-extensions:
  pinchy-pdf-cache:
