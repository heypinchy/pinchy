services:
  pinchy:
    image: ghcr.io/heypinchy/pinchy:${PINCHY_VERSION:?set PINCHY_VERSION in .env (e.g. PINCHY_VERSION=v0.5.0)}
    ports:
      - "${PINCHY_PORT:-127.0.0.1:7777}:7777"
    environment:
      - DATABASE_URL=postgresql://pinchy:${DB_PASSWORD:-pinchy_dev}@db:5432/pinchy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - OPENCLAW_WS_URL=ws://openclaw:18789
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PINCHY_ENTERPRISE_KEY=${PINCHY_ENTERPRISE_KEY:-}
    volumes:
      - openclaw-config:/openclaw-config
      - openclaw-secrets:/openclaw-secrets
      - pinchy-workspaces:/openclaw-config/workspaces
      - openclaw-extensions:/openclaw-extensions
      - pinchy-secrets:/app/secrets
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:7777/api/internal/openclaw-config-ready', r => process.exit(r.statusCode === 200 ? 0 : 1))\"",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  openclaw:
    image: ghcr.io/heypinchy/pinchy-openclaw:${PINCHY_VERSION:?set PINCHY_VERSION in .env (e.g. PINCHY_VERSION=v0.5.0)}
    expose:
      - "18789"
    volumes:
      - openclaw-config:/root/.openclaw
      - openclaw-secrets:/openclaw-secrets
      - pinchy-workspaces:/root/.openclaw/workspaces
      - openclaw-extensions:/root/.openclaw/extensions
      - pinchy-data:/data
      - pinchy-pdf-cache:/var/cache/pinchy-files
    restart: unless-stopped
    depends_on:
      pinchy:
        condition: service_healthy

  db:
    image: postgres:17
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=pinchy
      - POSTGRES_USER=pinchy
      - POSTGRES_PASSWORD=${DB_PASSWORD:-pinchy_dev}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinchy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  openclaw-config:
  pinchy-workspaces:
  pinchy-data:
  pinchy-secrets:
  openclaw-extensions:
  pinchy-pdf-cache:
  openclaw-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      # uid/gid match the pinchy user inside the Pinchy container
      # (Dockerfile.pinchy: useradd -r → uid 999). OpenClaw runs as root
      # and can write here regardless of ownership; Pinchy needs ownership
      # to atomically rewrite secrets.json via writeSecretsFile().
      o: "mode=0770,uid=999,gid=999"
