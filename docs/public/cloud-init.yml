#cloud-config
# Pinchy %%PINCHY_VERSION%% — Automated VPS Setup
# https://docs.heypinchy.com/guides/vps-deployment/
#
# This cloud-init script installs Docker, deploys Pinchy, configures
# a firewall, and adds swap. Paste it into the "User Data" field when
# creating your server.
#
# After boot (~5 minutes), visit http://<your-server-ip>

package_update: true

packages:
  - docker.io
  - docker-compose-v2
  - git
  - ufw

runcmd:
  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Firewall — allow SSH, HTTP, and HTTPS
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Add 2 GB swap (recommended for 4 GB servers)
  - fallocate -l 2G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab

  # Show a branded loading page while Pinchy builds
  - mkdir -p /opt/pinchy-loading
  - curl -fsSL https://docs.heypinchy.com/installing.html -o /opt/pinchy-loading/index.html || true
  - sed -i "s/INSTALL_START_TIME/$(date +%s)000/" /opt/pinchy-loading/index.html
  - cd /opt/pinchy-loading && python3 -m http.server 80 &
  - echo $! > /tmp/loading-server.pid

  # Clone and build Pinchy (build only, don't start yet)
  - git clone https://github.com/heypinchy/pinchy.git /opt/pinchy
  - cd /opt/pinchy && git checkout %%PINCHY_VERSION%%
  - echo 'PINCHY_PORT=80' > /opt/pinchy/.env
  - cd /opt/pinchy && docker compose build

  # Stop the loading page, then start Pinchy on port 80
  - kill $(cat /tmp/loading-server.pid) 2>/dev/null || true
  - rm -rf /opt/pinchy-loading /tmp/loading-server.pid
  - cd /opt/pinchy && docker compose up -d
